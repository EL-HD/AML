; ─────────────────────────────────────────────────────────────────────────────
; supervisord.conf — Sovereign AML · Railway single-service
;
; Proceso 1 (prioridad 10): FastAPI/uvicorn en 127.0.0.1:8000 (solo interno)
; Proceso 2 (prioridad 20): Streamlit en 0.0.0.0:%(ENV_PORT)s (expuesto)
; ─────────────────────────────────────────────────────────────────────────────

[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
logfile_maxbytes=10MB
logfile_backups=2
loglevel=info
pidfile=/tmp/supervisord.pid

; Socket UNIX para supervisorctl (útil para debug dentro del contenedor)
[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; ─── FastAPI (interno, solo loopback) ────────────────────────────────────────
[program:fastapi]
command=uvicorn auth_api:app --host 127.0.0.1 --port 8000 --workers 1
directory=/app
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ─── Streamlit (expuesto en $PORT, por defecto 8501) ─────────────────────────
[program:streamlit]
command=streamlit run app.py
    --server.port %(ENV_PORT)s
    --server.address 0.0.0.0
    --server.headless true
    --server.enableCORS false
    --server.enableXsrfProtection true
directory=/app
autostart=true
autorestart=true
startsecs=10
stopwaitsecs=15
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
