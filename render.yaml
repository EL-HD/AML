databases:
  - name: sovereign-aml-db
    databaseName: aml_db
    user: aml_user
    plan: free

services:
  # --- Servicio 1: API de Autenticación (FastAPI) ---
  - type: web
    name: sovereign-aml-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn auth_api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sovereign-aml-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0

  # --- Servicio 2: Frontend (Streamlit) ---
  - type: web
    name: sovereign-aml-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: free
    envVars:
      # IMPORTANTE: Después de desplegar sovereign-aml-api, copia su URL aquí.
      # Formato: https://sovereign-aml-api.onrender.com  (sin barra al final)
      - key: AUTH_API_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
